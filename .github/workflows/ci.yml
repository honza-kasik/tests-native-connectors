name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install httpd
        run: |
          sudo apt-get update
          sudo apt-get install -y apache2 apache2-utils

      - name: Download WildFly
        run: mvn dependency:copy -Pdownload-wildfly -q

      - name: Run tests
        run: mvn test -B

  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install IIS and Windows Authentication
        run: |
          Install-WindowsFeature Web-Server
          Install-WindowsFeature Web-Windows-Auth
          Install-WindowsFeature Web-ISAPI-Filter
          Install-WindowsFeature Web-ISAPI-Ext

      - name: Download WildFly
        run: mvn dependency:copy -Pdownload-wildfly -q

      - name: Run tests
        run: mvn test -B
